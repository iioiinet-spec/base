<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진법 변환 문제집</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #faf7f2;
  --surface2: #ede8df;
  --ink: #1a1510;
  --ink2: #3d3528;
  --ink3: #7a6e5f;
  --ink4: #b5a99a;
  --red: #c0392b;
  --blue: #1a5276;
  --green: #1e8449;
  --orange: #d35400;
  --purple: #6c3483;
  --border: #cfc4b3;
  --shadow: rgba(26,21,16,.12);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  position: relative;
}

/* grid texture */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(26,21,16,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,21,16,.04) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events:none; z-index:0;
}

/* ─ HEADER ─ */
.header {
  background: var(--ink);
  color: var(--bg);
  padding: 36px 32px 28px;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '01 10 11 00 1011 1100';
  position:absolute; right:20px; top:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:rgba(245,240,232,.1);
  letter-spacing:.15em; line-height:2;
  pointer-events:none;
}
.header-badge {
  display:inline-block;
  background:var(--red); color:#fff;
  font-size:10px; letter-spacing:.2em; text-transform:uppercase;
  padding:4px 12px; margin-bottom:14px;
  font-weight:700;
}
.header h1 {
  font-family:'Black Han Sans', sans-serif;
  font-size:clamp(28px,5vw,48px);
  line-height:1.1; letter-spacing:-.01em;
}
.header h1 span { color:#e8b84b; }
.header-sub {
  margin-top:10px; color:rgba(245,240,232,.55);
  font-size:13px; font-weight:300;
}
.header-stats {
  display:flex; gap:24px; margin-top:20px; flex-wrap:wrap;
}
.hstat {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:rgba(245,240,232,.45);
}
.hstat strong { color:var(--bg); font-size:18px; display:block; font-weight:700; }

/* ─ STICKY CONTROLS ─ */
.controls {
  position:sticky; top:0; z-index:100;
  background:var(--ink); border-bottom:3px solid var(--red);
  padding:10px 20px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.progress-wrap {
  flex:1; min-width:120px;
  background:rgba(255,255,255,.1); height:4px; border-radius:0;
}
.progress-fill {
  height:100%; background:var(--red);
  transition:width .4s ease; width:0%;
}
.ctrl-label { font-size:11px; color:rgba(245,240,232,.4); letter-spacing:.1em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; white-space:nowrap; }
.ctrl-score { font-family:'JetBrains Mono',monospace; font-size:14px; color:#e8b84b; font-weight:700; white-space:nowrap; }
.filter-btns { display:flex; gap:6px; flex-wrap:wrap; }
.fbtn {
  padding:5px 12px; font-size:11px; letter-spacing:.08em;
  border:1px solid rgba(255,255,255,.15); background:transparent;
  color:rgba(245,240,232,.5); cursor:pointer;
  transition:.2s; font-family:'Noto Sans KR',sans-serif;
  text-transform:uppercase;
}
.fbtn:hover { border-color:rgba(255,255,255,.4); color:var(--bg); }
.fbtn.active { background:var(--red); border-color:var(--red); color:#fff; }

/* ─ MAIN ─ */
main { position:relative; z-index:1; max-width:880px; margin:0 auto; padding:32px 20px 80px; }

/* ─ SECTION TITLE ─ */
.section-title {
  display:flex; align-items:center; gap:14px;
  margin:32px 0 16px;
}
.section-title .line { flex:1; height:1px; background:var(--border); }
.section-title span {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; letter-spacing:.2em; text-transform:uppercase;
  color:var(--ink3); white-space:nowrap;
}

/* ─ PROBLEM CARD ─ */
.prob-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-left:4px solid var(--c, var(--ink3));
  padding:20px 22px;
  margin-bottom:12px;
  transition:all .2s;
  position:relative;
}
.prob-card:hover { box-shadow:4px 4px 0 var(--shadow); transform:translate(-2px,-2px); }
.prob-card.solved { border-left-color: var(--green)!important; }
.prob-card.wrong-attempt { border-left-color: var(--red)!important; }

.prob-header {
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
  margin-bottom:14px;
}
.prob-num {
  font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:.2em; color:var(--ink4);
  background:var(--surface2); padding:3px 8px;
  flex-shrink:0;
}
.prob-type-badge {
  font-size:10px; padding:2px 8px;
  background:var(--c,var(--ink3)); color:#fff;
  letter-spacing:.1em; text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
}
.prob-q {
  font-size:17px; font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--ink); line-height:1.5;
  margin-bottom:2px; flex:1;
}
.prob-q sub { font-size:11px; color:var(--c,var(--ink3)); vertical-align:baseline; }

/* answer row */
.ans-row {
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
}
.ans-input {
  font-family:'JetBrains Mono',monospace;
  font-size:16px; padding:9px 14px;
  border:2px solid var(--border);
  background:var(--surface2);
  color:var(--ink); outline:none;
  width:180px; transition:.2s;
  letter-spacing:.05em;
}
.ans-input:focus { border-color:var(--c,var(--ink)); background:#fff; }
.ans-input.correct { border-color:var(--green); background:rgba(30,132,73,.06); color:var(--green); }
.ans-input.incorrect { border-color:var(--red); background:rgba(192,57,43,.06); animation:shake .3s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

.sub-label { font-size:12px; color:var(--ink3); font-family:'JetBrains Mono',monospace; white-space:nowrap; }

.submit-btn {
  padding:9px 18px; background:var(--ink); color:var(--bg);
  border:none; font-size:13px; cursor:pointer;
  transition:.15s; font-family:'Noto Sans KR',sans-serif;
  font-weight:700; letter-spacing:.03em; flex-shrink:0;
}
.submit-btn:hover { background:var(--red); }
.submit-btn:disabled { background:var(--ink4); cursor:default; }

.reveal-btn {
  padding:9px 14px; background:transparent; color:var(--ink3);
  border:1px solid var(--border); font-size:12px; cursor:pointer;
  transition:.15s; font-family:'Noto Sans KR',sans-serif; flex-shrink:0;
}
.reveal-btn:hover { border-color:var(--ink); color:var(--ink); }

/* feedback */
.feedback {
  margin-top:12px; display:none;
}
.feedback.show { display:block; }
.fb-correct {
  padding:10px 14px; background:rgba(30,132,73,.07);
  border-left:3px solid var(--green); font-size:13px; color:var(--green);
  font-weight:600;
}
.fb-wrong {
  padding:10px 14px; background:rgba(192,57,43,.06);
  border-left:3px solid var(--red); font-size:13px; color:var(--red);
}

/* solution box */
.solution {
  margin-top:12px; display:none;
  background:var(--surface2); border:1px solid var(--border);
  padding:14px 16px;
}
.solution.show { display:block; }
.sol-title {
  font-size:10px; letter-spacing:.2em; text-transform:uppercase;
  color:var(--ink3); font-family:'JetBrains Mono',monospace;
  margin-bottom:10px;
}
.sol-step {
  display:flex; gap:8px; align-items:baseline;
  padding:4px 0;
  font-family:'JetBrains Mono',monospace; font-size:13px;
  color:var(--ink2); line-height:1.7;
  border-bottom:1px dashed var(--border);
}
.sol-step:last-child { border:none; }
.sol-step .sn { color:var(--ink4); font-size:10px; min-width:16px; }
.sol-answer {
  margin-top:10px; padding:10px 14px;
  background:var(--ink); color:#e8b84b;
  font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:700;
}

/* ─ STATUS ICON ─ */
.status-icon {
  position:absolute; right:16px; top:16px;
  font-size:18px; display:none;
}
.status-icon.show { display:block; }

/* ─ COMPLETION BANNER ─ */
.completion {
  display:none; text-align:center;
  padding:48px 32px; background:var(--ink); color:var(--bg);
  margin-top:32px;
  position:relative; overflow:hidden;
}
.completion::before {
  content:'🎉';
  position:absolute; font-size:120px; opacity:.06;
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.completion.show { display:block; animation:up .5s ease; }
.completion h2 {
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(28px,5vw,44px); margin-bottom:12px;
}
.completion h2 span { color:#e8b84b; }
.completion p { color:rgba(245,240,232,.6); font-size:15px; }
.completion .score-big {
  font-family:'JetBrains Mono',monospace;
  font-size:64px; font-weight:700; color:#e8b84b;
  margin:16px 0; line-height:1;
}
.restart-btn {
  margin-top:24px; padding:14px 32px;
  background:var(--red); color:#fff; border:none;
  font-size:15px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  transition:.2s;
}
.restart-btn:hover { background:#a93226; }

@keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* hide filtered */
.prob-card.hidden { display:none; }

/* dual answer for Q28 */
.dual-ans { display:flex; flex-direction:column; gap:8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">수학 · 정보</div>
  <h1>진법 <span>변환</span> 문제집</h1>
  <p class="header-sub">2진수 · 4진수 · 5진수 · 8진수 · 10진수 · 16진수 — 30문제 완전 정복</p>
  <div class="header-stats">
    <div class="hstat"><strong id="hSolved">0</strong>해결</div>

  </div>
</div>

<div class="controls">

  <div class="filter-btns">
    <button class="fbtn active" onclick="filterProbs('all',this)">전체</button>

</div>

<main id="mainContent"></main>

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let solvedSet = new Set();
let wrongSet = new Set();
const TOTAL = problems.length;

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
const TYPE_LABELS = { to10:'→ 10진수', from10:'10진수 →', cross:'진법 ↔ 진법', special:'응용 문제' };
const SECTION_TITLES = {
  to10: '타 진수 → 10진수 변환',
  from10: '10진수 → 타 진수 변환',
  cross: '진법 간 직접 변환',
  special: '응용 문제',
};

function buildAll() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  const groups = ['to10','from10','cross','special'];
  groups.forEach(g => {
    const probs = problems.filter(p=>p.type===g);
    if(!probs.length) return;
    // section title
    const st = document.createElement('div');
    st.className = 'section-title';
    st.innerHTML = `<div class="line"></div><span>${SECTION_TITLES[g]}</span><div class="line"></div>`;
    st.dataset.group = g;
    main.appendChild(st);
    probs.forEach(p => {
      main.appendChild(buildCard(p));
    });
  });
  updateStats();
}

function buildCard(p) {
  const color = COLOR_MAP[p.type];
  const card = document.createElement('div');
  card.className = 'prob-card';
  card.style.setProperty('--c', color);
  card.id = 'card-' + p.id;
  card.dataset.type = p.type;

  const badge = `<span class="prob-type-badge" style="background:${color}">${TYPE_LABELS[p.type]}</span>`;

  let ansHtml = '';
  if(p.dual) {
    // Two answers for Q28
    ansHtml = `
      <div class="dual-ans">
        <div class="ans-row">
          <span class="sub-label">2진수:</span>
          <input class="ans-input" id="ans2-${p.id}" type="text" placeholder="예) 1010110" autocomplete="off" onkeydown="if(event.key==='Enter')submitDual(${p.id})">
        </div>
        <div class="ans-row">
          <span class="sub-label">8진수:</span>
          <input class="ans-input" id="ans8-${p.id}" type="text" placeholder="예) 173" autocomplete="off" onkeydown="if(event.key==='Enter')submitDual(${p.id})">
        </div>
        <div class="ans-row" style="margin-top:4px">
          <button class="submit-btn" id="sbtn-${p.id}" onclick="submitDual(${p.id})">확인</button>
          <button class="reveal-btn" onclick="toggleSolution(${p.id})">해설 보기</button>
        </div>
      </div>`;
  } else {
    ansHtml = `
      <div class="ans-row">
        <span class="sub-label">${p.inputLabel}</span>
        <input class="ans-input" id="ans-${p.id}" type="text" placeholder="답 입력" autocomplete="off" onkeydown="if(event.key==='Enter')submitAns(${p.id})">
        <button class="submit-btn" id="sbtn-${p.id}" onclick="submitAns(${p.id})">확인</button>
        <button class="reveal-btn" onclick="toggleSolution(${p.id})">해설 보기</button>
      </div>`;
  }

  const solSteps = p.solution.map((s,i)=>
    `<div class="sol-step"><span class="sn">${i+1}</span><span>${s}</span></div>`
  ).join('');

  card.innerHTML = `
    <span class="status-icon" id="icon-${p.id}"></span>
    <div class="prob-header">
      <div>
        <div class="prob-num">NO. ${String(p.id).padStart(2,'0')}</div>
        <div class="prob-q">${p.display}</div>
      </div>
      ${badge}
    </div>
    ${ansHtml}
    <div class="feedback" id="fb-${p.id}"></div>
    <div class="solution" id="sol-${p.id}">
      <div class="sol-title">풀이 과정</div>
      ${solSteps}
      <div class="sol-answer">정답: ${p.finalAns}</div>
    </div>`;
  return card;
}

// ══════════════════════════════════════════
// ANSWER CHECK
// ══════════════════════════════════════════
function normalize(s) {
  return s.trim().replace(/\s/g,'').replace(/[()]/g,'').toLowerCase();
}

function submitAns(id) {
  const p = problems.find(x=>x.id===id);
  if(!p || solvedSet.has(id)) return;
  const inp = document.getElementById('ans-'+id);
  const val = normalize(inp.value);
  const correct = p.answers.some(a => normalize(a) === val);
  showFeedback(id, correct, p.finalAns);
  if(correct) {
    inp.classList.add('correct');
    inp.disabled = true;
    document.getElementById('sbtn-'+id).disabled = true;
    markSolved(id);
  } else {
    inp.classList.add('incorrect');
    setTimeout(()=>inp.classList.remove('incorrect'), 400);
    wrongSet.add(id);
    document.getElementById('card-'+id).classList.add('wrong-attempt');
  }
}

function submitDual(id) {
  const p = problems.find(x=>x.id===id);
  if(!p || solvedSet.has(id)) return;
  const v2 = normalize(document.getElementById('ans2-'+id).value);
  const v8 = normalize(document.getElementById('ans8-'+id).value);
  const c2 = p.answers2.some(a=>normalize(a)===v2);
  const c8 = p.answers8.some(a=>normalize(a)===v8);
  const correct = c2 && c8;

  const fb = document.getElementById('fb-'+id);
  if(correct) {
    fb.innerHTML = `<div class="fb-correct">✓ 정답입니다! 2진수와 8진수 모두 맞았습니다.</div>`;
    fb.className = 'feedback show';
    document.getElementById('ans2-'+id).classList.add('correct');
    document.getElementById('ans8-'+id).classList.add('correct');
    document.getElementById('ans2-'+id).disabled = true;
    document.getElementById('ans8-'+id).disabled = true;
    document.getElementById('sbtn-'+id).disabled = true;
    markSolved(id);
  } else {
    let msg = '틀렸습니다. ';
    if(!c2) msg += '2진수를 확인하세요. ';
    if(!c8) msg += '8진수를 확인하세요. ';
    fb.innerHTML = `<div class="fb-wrong">✗ ${msg}</div>`;
    fb.className = 'feedback show';
    if(!c2) { document.getElementById('ans2-'+id).classList.add('incorrect'); setTimeout(()=>document.getElementById('ans2-'+id).classList.remove('incorrect'),400); }
    if(!c8) { document.getElementById('ans8-'+id).classList.add('incorrect'); setTimeout(()=>document.getElementById('ans8-'+id).classList.remove('incorrect'),400); }
    wrongSet.add(id);
    document.getElementById('card-'+id).classList.add('wrong-attempt');
  }
}

function showFeedback(id, correct, ans) {
  const fb = document.getElementById('fb-'+id);
  if(correct) {
    fb.innerHTML = `<div class="fb-correct">✓ 정답입니다! — ${ans}</div>`;
  } else {
    fb.innerHTML = `<div class="fb-wrong">✗ 틀렸습니다. 다시 도전하거나 해설을 확인하세요.</div>`;
  }
  fb.className = 'feedback show';
}

function markSolved(id) {
  solvedSet.add(id);
  wrongSet.delete(id);
  const card = document.getElementById('card-'+id);
  card.classList.remove('wrong-attempt');
  card.classList.add('solved');
  const icon = document.getElementById('icon-'+id);
  icon.textContent = '✓';
  icon.style.color = '#1e8449';
  icon.className = 'status-icon show';
  updateStats();
  if(solvedSet.size === TOTAL) showCompletion();
}

// ══════════════════════════════════════════
// SOLUTION TOGGLE
// ══════════════════════════════════════════
function toggleSolution(id) {
  const sol = document.getElementById('sol-'+id);
  sol.classList.toggle('show');
}

// ══════════════════════════════════════════
// STATS
// ══════════════════════════════════════════
function updateStats() {
  const s = solvedSet.size;
  const pct = Math.round(s/TOTAL*100);
  document.getElementById('hSolved').textContent = s;
  document.getElementById('hPct').textContent = pct + '%';
  document.getElementById('ctrlScore').textContent = s + ' / ' + TOTAL;
  document.getElementById('pbarFill').style.width = pct + '%';
}

// ══════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════
function filterProbs(type, btn) {
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.prob-card').forEach(c => {
    if(type === 'all' || c.dataset.type === type) c.classList.remove('hidden');
    else c.classList.add('hidden');
  });
  document.querySelectorAll('.section-title').forEach(st => {
    if(type === 'all' || st.dataset.group === type) st.classList.remove('hidden');
    else st.classList.add('hidden');
  });
}

// ══════════════════════════════════════════
// COMPLETION
// ══════════════════════════════════════════
function showCompletion() {
  const el = document.getElementById('completion');
  if(el) { el.classList.add('show'); return; }
  const div = document.createElement('div');
  div.className = 'completion show';
  div.id = 'completion';
  div.innerHTML = `
    <h2>모든 문제 <span>완료!</span></h2>
    <div class="score-big">${TOTAL}/${TOTAL}</div>
    <p>진법 변환 마스터! 수고하셨습니다 🎉</p>
    <button class="restart-btn" onclick="restartAll()">다시 풀기 ↺</button>`;
  document.getElementById('mainContent').appendChild(div);
}

function restartAll() {
  solvedSet.clear(); wrongSet.clear();
  buildAll();
  const c = document.getElementById('completion');
  if(c) c.remove();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
buildAll();
document.getElementById('hTotal').textContent = TOTAL;
</script>
