let activeN=1;

function updateStats(){
  const correct=Object.values(state.results).filter(r=>r==='correct').length;
  const wrong=Object.values(state.results).filter(r=>r==='wrong').length;
  document.getElementById('s-correct').textContent=correct;
  document.getElementById('s-wrong').textContent=wrong;
  document.getElementById('s-left').textContent=10-correct-wrong;
}

function renderProg(){
  const w=document.getElementById('prog-row');
  w.innerHTML='';
  QS.forEach(q=>{
    const d=document.createElement('div');
    const r=state.results[q.n];
    d.className='pd'+(r==='correct'?' correct':r==='wrong'?' wrong':activeN===q.n?' cur':'');
    d.title=`${q.n}번`;d.textContent=q.n;
    d.onclick=()=>goQ(q.n);
    w.appendChild(d);
  });
}

function renderNav(){
  const w=document.getElementById('q-nav');
  w.innerHTML='';
  QS.forEach(q=>{
    const btn=document.createElement('button');
    const r=state.results[q.n];
    btn.className='qn'+(activeN===q.n?' active':r==='correct'?' correct':r==='wrong'?' wrong':'');
    btn.textContent=`${q.n}번`;
    btn.onclick=()=>goQ(q.n);
    w.appendChild(btn);
  });
}

function goQ(n){
  activeN=n;
  renderNav();renderProg();
  renderQ(n);
  document.getElementById('q-area').scrollIntoView({behavior:'smooth',block:'start'});
}

function normalize(s){
  return s.replace(/\s/g,'').replace(/,/g,'').toLowerCase();
}

function checkAnswer(n){
  const q=QS[n-1];
  const inp=document.getElementById('ans_'+n);
  const val=inp?inp.value.trim():'';
  const correct=normalize(val)===normalize(q.ans)||normalize(val)===normalize(q.ans.replace(/가지/,'').replace(/개/,'').replace(/m/,'').trim());
  state.results[n]=correct?'correct':'wrong';
  updateStats();renderProg();renderNav();
  if(inp){inp.className='ans-input '+(correct?'ok':'ng');}
  const fb=document.getElementById('fb_'+n);
  if(fb){
    fb.className='feedback on '+(correct?'ok':'ng');
    const title=fb.querySelector('.fb-title');
    const body=fb.querySelector('.fb-body');
    if(title){title.className='fb-title '+(correct?'ok':'ng');title.textContent=correct?'정답입니다! 🎉':'오답입니다.';}
    if(body){
      let html=`<p style="margin-bottom:8px">${q.explanation}</p>`;
      if(!correct){
        html+=`<div class="ans-reveal"><div class="ar-lbl">정답</div><div class="ar-val">${q.ans}</div></div>`;
      }
      html+=`<div class="step-list" style="margin-top:8px">`;
      q.steps.forEach((s,i)=>{html+=`<div class="step-item"><div class="si-n">${i+1}</div><div class="si-t">${s}</div></div>`;});
      html+=`</div>`;
      body.innerHTML=html;
    }
  }
}

function showHint(n){
  state.hints[n]=true;
  const h=document.getElementById('hint_'+n);
  if(h)h.classList.add('on');
}

function showSolution(n){
  const q=QS[n-1];
  const fb=document.getElementById('fb_'+n);
  if(fb){
    fb.className='feedback on ng';
    const title=fb.querySelector('.fb-title');
    const body=fb.querySelector('.fb-body');
    if(title){title.className='fb-title ng';title.textContent='해설 보기';}
    if(body){
      let html=`<p style="margin-bottom:8px">${q.explanation}</p>`;
      html+=`<div class="ans-reveal"><div class="ar-lbl">정답</div><div class="ar-val">${q.ans}</div></div>`;
      html+=`<div class="step-list" style="margin-top:8px">`;
      q.steps.forEach((s,i)=>{html+=`<div class="step-item"><div class="si-n">${i+1}</div><div class="si-t">${s}</div></div>`;});
      html+=`</div>`;
      body.innerHTML=html;
    }
  }
  if(!state.results[n]) state.results[n]='wrong';
  updateStats();renderProg();renderNav();
}

function renderQ(n){
  const q=QS[n-1];
  const area=document.getElementById('q-area');
  const r=state.results[n];
  area.innerHTML=`<div class="q-card">
    <div class="q-header">
      <div class="q-num">${q.n}번 문제 <span class="q-type">${q.type}</span></div>
    </div>
    <div class="q-stem">${q.stem}</div>
    <div class="ans-wrap">
      <div class="ans-label">답 입력:</div>
      <input type="text" id="ans_${n}" class="ans-input${r==='correct'?' ok':r==='wrong'?' ng':''}" placeholder="답을 입력하세요..." value="${(document.getElementById('ans_'+n)&&document.getElementById('ans_'+n).value)||''}" ${r?'readonly':''}>
    </div>
    <div class="hint-box${state.hints[n]?' on':''}" id="hint_${n}">${q.hint}</div>
    <div class="btn-row">
      ${!r?`<button class="btn pri" onclick="checkAnswer(${n})">정답 확인</button>`:''}
      ${!r?`<button class="btn" onclick="showHint(${n})">힌트 보기</button>`:''}
      ${!r?`<button class="btn" onclick="showSolution(${n})">해설 보기</button>`:''}
      ${r?`<button class="btn" onclick="resetQ(${n})">다시 풀기</button>`:''}
    </div>
    <div class="feedback${r?(' on '+(r==='correct'?'ok':'ng')):''}${r?'':''}" id="fb_${n}">
      <div class="fb-title ${r?r:''}"></div>
      <div class="fb-body"></div>
    </div>
    <div class="nav-bottom">
      <button class="btn" onclick="goQ(${n>1?n-1:1})" ${n===1?'disabled':''}>← 이전</button>
      ${n===10?`<button class="btn pri" onclick="showResult()">전체 결과 보기</button>`:
      `<button class="btn pri" onclick="goQ(${n+1})">다음 →</button>`}
    </div>
  </div>`;
  if(r){
    const fb=document.getElementById('fb_'+n);
    const title=fb?fb.querySelector('.fb-title'):null;
    const body=fb?fb.querySelector('.fb-body'):null;
    if(title){title.className='fb-title '+(r==='correct'?'ok':'ng');title.textContent=r==='correct'?'정답입니다! 🎉':'오답 / 해설';}
    if(body){
      let html=`<p style="margin-bottom:8px">${q.explanation}</p>`;
      if(r==='wrong') html+=`<div class="ans-reveal"><div class="ar-lbl">정답</div><div class="ar-val">${q.ans}</div></div>`;
      html+=`<div class="step-list" style="margin-top:8px">`;
      q.steps.forEach((s,i)=>{html+=`<div class="step-item"><div class="si-n">${i+1}</div><div class="si-t">${s}</div></div>`;});
      html+=`</div>`;
      body.innerHTML=html;
    }
  }
}

function resetQ(n){
  delete state.results[n];
  delete state.hints[n];
  updateStats();renderProg();renderNav();
  renderQ(n);
}

function showResult(){
  const correct=Object.values(state.results).filter(r=>r==='correct').length;
  const rp=document.getElementById('result-panel');
  let msg='';
  if(correct>=9) msg='완벽합니다! 이산수학 실력이 뛰어납니다.';
  else if(correct>=7) msg='잘 했습니다! 틀린 문제를 다시 확인해보세요.';
  else if(correct>=5) msg='절반 이상 맞았습니다. 꾸준히 연습하세요!';
  else msg='기초부터 다시 복습해봐요. 할 수 있습니다!';
  let html=`<div class="result-score">${correct} / 10</div><div class="result-msg">${msg}</div><div class="result-grid">`;
  QS.forEach(q=>{
    const r=state.results[q.n];
    html+=`<div class="rg-item"><div class="rgi-n">${q.n}번</div><div class="rgi-r" style="color:${r==='correct'?'#1D9E75':r==='wrong'?'#E24B4A':'var(--color-text-tertiary)'}">${r==='correct'?'✓':r==='wrong'?'✗':'—'}</div></div>`;
  });
  html+=`</div><button class="btn pri" onclick="document.getElementById('result-panel').classList.remove('on');goQ(1)">처음부터 다시 풀기</button>`;
  rp.innerHTML=html;
  rp.classList.add('on');
  rp.scrollIntoView({behavior:'smooth',block:'nearest'});
}

renderProg();renderNav();renderQ(1);
</script>
